# GitHub secret scanning + push-protection exclusions.
#
# The kit DELIBERATELY embeds secret-shaped strings — fake tokens used to
# test the Poison_Guard regex catalog (packages/cli/src/poison-guard.mjs,
# design §6.7) and the secret-handling write paths. These are NOT real
# credentials. Mirrors the allowlist in .gitleaks.toml so the GitHub-native
# scanner (alerts + push protection) doesn't flag them or block edits.
paths-ignore:
  - 'tests/cli-poison-guard.test.js'
  - 'tests/cli-poison-guard-log.test.js'
  - 'tests/cli-memory-write.test.js'
  - 'tests/cli-write-fact.test.js'
  - 'tests/cli-remember.test.js'
  - 'tests/cli-auto-extract.test.js'
  - 'tests/security-posture.test.js'
  - 'packages/cli/src/poison-guard.mjs'
  - '.gitguardian.yaml'
  - '.gitleaks.toml'
  - 'SECURITY.md'
