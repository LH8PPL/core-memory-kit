# Task 141b perf bake-off (D-147) — node:sqlite vs better-sqlite3 on the kit's
# gated read/search paths. NOT a per-PR gate: it's the evaluation harness that
# decides the node:sqlite migration. A CI runner is far quieter than a dev
# laptop, so the measurement noise (rsd) should fall below the 3% bar and give
# the trustworthy verdict a laptop can't (the bench itself reports INCONCLUSIVE
# + exit 2 when its noise rivals the bar).
#
# Manually triggered (workflow_dispatch). Node 24 — node:sqlite needs ≥ 22.5.
name: Bench (storage bake-off)

on:
  workflow_dispatch:
    inputs:
      corpus:
        description: 'corpus size (rows)'
        default: '2000'
      batch:
        description: 'queries per timed sample'
        default: '200'
      n:
        description: 'samples per op'
        default: '25'

permissions:
  contents: read

jobs:
  bench:
    name: node:sqlite vs better-sqlite3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - run: npm ci --no-audit --no-fund
      - name: Run the storage bake-off
        run: |
          node --experimental-sqlite scripts/bench-storage.mjs \
            --corpus "${{ github.event.inputs.corpus }}" \
            --batch "${{ github.event.inputs.batch }}" \
            --n "${{ github.event.inputs.n }}"
        # The script exits: 0 = PASS (clean), 1 = FAIL (clean), 2 = INCONCLUSIVE
        # (noise ≥ bar). All three are informative — don't mask the exit code.
