name: canonicalize parity

on:
  pull_request:
    paths:
      - 'packages/canonicalize/**'
      - 'python/cmk_canonicalize/**'
      - 'python/tests/**'
      - 'fixtures/canonicalize-vectors.json'
      - 'scripts/parity-*.mjs'
      - 'scripts/parity-*.py'
      - 'tests/canonicalize.test.js'
      - '.github/workflows/canonicalize-parity.yml'
  push:
    branches: [main]

jobs:
  parity:
    name: Node ≡ Python on canonicalize-vectors.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Node deps
        run: npm install

      - name: Install pytest
        run: python -m pip install pytest

      - name: Run Node canonicalize tests (vitest)
        run: npx vitest run tests/canonicalize.test.js

      - name: Run Python canonicalize tests (pytest)
        working-directory: python
        run: python -m pytest -q

      - name: Cross-implementation byte-identical parity check
        env:
          PYTHON: python3
        run: node scripts/parity-check.mjs
