# SonarQube Cloud (SonarCloud) CI-based analysis — code-quality / maintainability
# / reliability / security-hotspots + coverage. Adapted from SonarCloud's
# generated "With GitHub Actions" snippet, with the npm + coverage steps added
# so the lcov report (sonar.javascript.lcov.reportPaths in sonar-project.properties)
# exists before the scan.
#
# NOTE: CI-based analysis is mutually exclusive with SonarCloud "Automatic
# Analysis" — the latter must be OFF in the project settings (the GitHub-Action
# onboarding turns it off). SONAR_TOKEN is a repo Actions secret.
#
# KNOWN-RED (D-39): the "SonarCloud Code Analysis" gate check stays ERROR on
# `new_security_hotspots_reviewed` — 27 false-positive hotspots (internal-only
# regexes / provenance sha1 / fixed-binary spawns). ACCEPTED as cosmetic: it never
# blocks a merge, and real security is gated green by CodeQL + gitleaks +
# osv-scanner + npm-audit. The clean fix (remove that one gate condition) is
# paywalled on SonarCloud's free tier. Do NOT NOSONAR-sweep or upgrade to green it.
# See docs/journey/DECISION-LOG.md D-39.
name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  sonarcloud:
    name: SonarQube Cloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history for accurate blame / new-code detection
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm ci --no-audit --no-fund
      # Cache the HF test model (bge-small) — SAME step as ci.yml's test +
      # coverage jobs (Task 125.3 / PR #152). Without it this job's uncached
      # runner re-fetches the model, hits the HF Hub's shared-IP rate limit
      # (HTTP 429), and the semantic-backend tests FAIL — which aborts the
      # vitest run before `coverage/lcov.info` is written, so Sonar finds no
      # LCOV and reports new_coverage:0% (the v0.3.1 cut-gate PR #184 symptom).
      # The cacheDir is INSIDE node_modules (@huggingface/transformers
      # DEFAULT_CACHE_DIR) and `npm ci` wipes node_modules, so this restores
      # AFTER npm ci. See docs/journey/DECISION-LOG.md D-155.
      - uses: actions/cache@v5
        with:
          path: node_modules/@huggingface/transformers/.cache
          key: hf-models-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: hf-models-${{ runner.os }}-
      # Generate coverage/lcov.info for Sonar to ingest. `|| true` so a coverage
      # threshold miss doesn't block the Sonar scan (the `coverage` job in ci.yml
      # is the hard threshold gate; here we only need the lcov for Sonar).
      - run: npm run test:coverage || true
      - name: SonarQube Cloud Scan
        # SHA-pinned (v8.1.0) per SonarCloud's generated snippet — supply-chain
        # hardening (Task 53), and the ref is verified to exist.
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
