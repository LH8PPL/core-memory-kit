sonar.projectKey=LH8PPL_core-memory-kit
sonar.organization=lh8ppl

# Task 224 — the `opendir '<workspace>/C:/proj/context'` crash: ROOT-CAUSED
# 2026-07-15 (D-341), correcting the earlier "server-side, not repo-fixable /
# just live with it" conclusion. Chain of evidence from the scan log + the
# SonarCloud settings API:
#   1. The failed sensor is `Scan Manifest A3S Context Collector` → then
#      `WebSensor.analyzeProject` throws ENOENT on `C:/proj/context`. "A3S" is
#      SonarCloud's Architecture Analysis. The bad path is MANIFEST-derived
#      (built before per-file analysis) — which is why the prior exclusion +
#      base-dir attempts never touched it.
#   2. `GET /api/settings/values?component=…` shows exactly ONE project-level
#      (non-inherited) setting: `sonar.autoscan.enabled` — i.e. SonarCloud
#      "Automatic Analysis" is ON. It got re-enabled during SonarCloud's A3S
#      rollout ~2026-07-11 12:42 — the exact timestamp the crash began.
#   3. This file's own workflow header states CI-based analysis is MUTUALLY
#      EXCLUSIVE with Automatic Analysis. Both running = the autoscan's cached
#      architecture manifest (holding a stale Windows dev path from an old run)
#      gets replayed into the CI scan's A3S collector → the opendir crash.
# THE FIX (keeps Architecture analysis ON): turn OFF Automatic Analysis in the
# SonarCloud UI (project → Administration → Analysis Method → disable Automatic
# Analysis; CI-based becomes the sole method). Architecture analysis still runs
# — inside the clean-Linux CI scan, without the stale autoscan manifest. NOT a
# feature-disable; a mode reconciliation the workflow always assumed. Server-
# side action (the maintainer's), but a SPECIFIC one, not a support ticket.
# See Task 224 / D-341.

# Analyze the kit's actual JS source. Sources are scoped to the published
# packages' src so SonarQube Cloud's coverage % aligns with the vitest v8
# coverage we generate (same scope as vitest.config.js include).
#
# Tests are NOT analyzed (Task 187, D-254 — decision-trail):
#   Original config (pre-2026-07-02): sonar.tests=tests + test.inclusions
#   analyzed every *.test.js. Removed for two reasons, both proven live:
#   (1) the SonarJS/TS-ESLint bridge crashes non-deterministically on
#       tests/cli-forget.test.js ("Debug Failure. No error for last overload
#       signature", D-250) — an upstream analyzer bug that flaky-reds pushes;
#   (2) guard-test FIXTURES legitimately contain "dangerous" content — the
#       Poison_Guard bidi test tripped text:S6389 as a new-code VULNERABILITY
#       (2026-07-02 gate red) because the test's INPUT is the attack the guard
#       must block. A security tool's tests look like attacks to a scanner.
#   Sonar's remaining value on tests (S2699 assertion-presence) is covered
#   structurally by scripts/validate-exit-doors.mjs. Coverage is unaffected
#   (lcov measures sources, not tests).
sonar.sources=packages/cli/src,packages/canonicalize/src

# Coverage: vitest writes coverage/lcov.info via `npm run test:coverage`
# (run by the sonarcloud workflow before the scan).
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclude generated / vendored / non-runtime from analysis. (node_modules,
# coverage are excluded by default.) packages/cli/template/ is the generated
# copy of the canonical template/ (gitignored at publish, but guard anyway).
#
# context/** + context.local/** + docs/** + template/ + tests/** are EXCLUDED
# (2026-07-12): non-runtime prose / scaffold / test files a code scanner should
# not analyze. tests/ completes the D-254 intent (tests aren't sources here and
# `sonar.tests` was removed, but the analyzer still INDEXED them as ambient
# files). Coverage is unaffected (lcov measures sources).
#
# ⚠️ HONEST NOTE (Task 224, D-324): these exclusions are correct HYGIENE but do
# NOT fix the standing SonarCloud CRASH (`opendir '<workspace>/C:/proj/context'`,
# exit 3, JS/Web analyzer plugin v13.2.0). That path is NOT in any tracked file
# (config, source, tests, or lcov — all grepped) — it is almost certainly a
# STALE SERVER-SIDE project setting (a Windows dev path) or a plugin defect,
# reachable only from the SonarCloud web UI, not this repo. The crash began
# 2026-07-11 (between the 10:07 clean run and the 12:42 crash) during the
# v0.5.1 lane but is NOT caused by any analyzed code we ship. SonarCloud is
# ADVISORY (CI/CodeQL/gitleaks/osv gate real quality); v0.5.1 published green.
# See Task 224 for the server-side investigation.
sonar.exclusions=**/node_modules/**,**/bin/**,scripts/**,tests/**,fixtures/**,packages/cli/template/**,template/**,context/**,context.local/**,docs/**,**/*.config.js
sonar.coverage.exclusions=context/**,docs/**,tests/**

sonar.sourceEncoding=UTF-8

# S4036 (PATH-resolution in spawns) — Safe by the D-128 triage (2026-06-12,
# all 31 hotspots reviewed): "PATH is the user's own trust domain." The kit is
# a LOCAL CLI; it spawns the user's own tools (git / claude / node) by name
# exactly as every dev tool does — hardcoding absolute paths would break
# cross-platform (the one spawn that CAN pin a path, the registered cron task,
# already uses the absolute node path). Re-surfaced 2026-07-03 as a new-code
# VULNERABILITY on the Task-150 read-only `git status` probe (400ms leash,
# --no-optional-locks) when the D-264 fix touched its lines; encoding the
# already-made triage here keeps it durable instead of a per-issue UI click.
sonar.issue.ignore.multicriteria=s4036
sonar.issue.ignore.multicriteria.s4036.ruleKey=javascript:S4036
sonar.issue.ignore.multicriteria.s4036.resourceKey=packages/cli/src/**
